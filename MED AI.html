<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>MedAI • Universal Medicine Guide (Offline)</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f0f7ff 0%, #e6f0fa 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 3rem;
      box-shadow: 0 30px 60px rgba(0, 20, 40, 0.25), inset 0 1px 1px rgba(255, 255, 255, 0.7);
      width: 100%;
      max-width: 750px;
      padding: 2.5rem 2rem;
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.3s ease;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      background: #0b5e7c;
      background: linear-gradient(135deg, #0a4860, #13829b);
      width: 3.4rem;
      height: 3.4rem;
      border-radius: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 20px -10px rgba(19, 130, 155, 0.5);
      color: white;
      font-size: 1.8rem;
    }

    .title h1 {
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #0a2f3c;
      line-height: 1.2;
    }

    .title .sub {
      font-size: 0.9rem;
      color: #2c5f73;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .search-section {
      margin: 1.8rem 0 1.5rem;
    }

    .input-group {
      display: flex;
      background: white;
      border-radius: 3rem;
      padding: 0.3rem;
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
      border: 1px solid rgba(19, 130, 155, 0.25);
      background: rgba(255,255,255,0.9);
    }

    .input-group input {
      flex: 1;
      border: none;
      padding: 1rem 1.4rem;
      font-size: 1.05rem;
      background: transparent;
      outline: none;
      border-radius: 3rem;
      font-weight: 500;
      color: #0b3b4a;
    }

    .input-group input::placeholder {
      color: #7a9ca8;
      font-weight: 400;
      font-style: italic;
    }

    .input-group button {
      background: #0b5e7c;
      background: linear-gradient(135deg, #0c4f68, #1b8ca3);
      border: none;
      color: white;
      font-weight: 600;
      padding: 0 2rem;
      border-radius: 2.5rem;
      font-size: 1rem;
      letter-spacing: 0.4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.25s;
      box-shadow: 0 6px 16px rgba(12, 79, 104, 0.45);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .input-group button:hover {
      background: linear-gradient(135deg, #0e5d78, #1fa1ba);
      box-shadow: 0 10px 18px rgba(10, 90, 110, 0.5);
      transform: scale(1.02);
    }

    .status-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0.5rem 0.3rem 1.8rem;
      flex-wrap: wrap;
    }

    .api-indicator {
      font-size: 0.8rem;
      background: #e0f0f5;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      color: #0a4b5c;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #0f5b6b;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      transition: 0.2s;
    }

    .clear-btn:hover {
      background: rgba(15, 91, 107, 0.1);
    }

    .result-card {
      background: white;
      border-radius: 2rem;
      padding: 1.8rem;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 18px 35px rgba(0, 32, 48, 0.15);
      border: 1px solid rgba(255,255,255,0.8);
      transition: 0.3s;
    }

    .medicine-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.3rem;
      flex-wrap: wrap;
    }

    .medicine-name {
      font-size: 1.9rem;
      font-weight: 700;
      color: #04323f;
      text-transform: capitalize;
      letter-spacing: -0.3px;
    }

    .badge {
      background: #1b8ca3;
      color: white;
      border-radius: 2rem;
      padding: 0.25rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 600;
      background: #0c6379;
    }

    .symptoms-box {
      background: #f3f9ff;
      border-radius: 1.4rem;
      padding: 1.4rem;
      margin: 1rem 0 0.8rem;
      border-left: 5px solid #0f6b82;
    }

    .symptoms-label {
      font-weight: 700;
      color: #062c38;
      font-size: 1rem;
      margin-bottom: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .disease-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin-top: 0.5rem;
    }

    .disease-tag {
      background: white;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      color: #0a3f4c;
      box-shadow: 0 4px 10px rgba(0,0,0,0.04);
      border: 1px solid #cde3ec;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .info-text {
      color: #2c5364;
      margin-top: 1rem;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .loader {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: #0b5b6e;
      font-weight: 500;
      padding: 1rem 0;
    }

    .error-message {
      color: #b13b3b;
      background: #ffe9e9;
      padding: 0.9rem 1.2rem;
      border-radius: 1.5rem;
      font-weight: 500;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 500px) {
      .glass-card {
        padding: 1.8rem 1.2rem;
      }
      .input-group button {
        padding: 0 1.2rem;
      }
    }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #e94560;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 2rem;
            font-size: 1.1rem;
            transition: color 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #e94560;
        }

        /* Hero Section with Poster */
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 5%;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 90vh;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .hero-content {
            flex: 1;
            min-width: 300px;
        }

        .hero-content h1 {
            font-size: 4.5rem;
            margin-bottom: 1rem;
            animation: glow 2s ease-in-out infinite alternate;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #e94560, 0 0 20px #e94560, 0 0 30px #e94560; }
            to { text-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b, 0 0 60px #ff6b6b; }
        }

        .hero-content .tagline {
            font-size: 1.3rem;
            color: #ccc;
            margin-bottom: 0.5rem;
            font-style: italic;
        }

        .hero-content .description {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .poster-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .poster {
            width: 100%;
            max-width: 400px;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(233, 69, 96, 0.3);
            border: 3px solid #e94560;
            transition: transform 0.3s, box-shadow 0.3s;
            background: #1a1a2e;
        }

        .poster:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 80px rgba(233, 69, 96, 0.5);
        }

        .poster img {
            width: 100%;
            height: auto;
            display: block;
        }

        .poster-placeholder {
            width: 100%;
            aspect-ratio: 2/3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #e94560;
            text-align: center;
            padding: 2rem;
        }

        .poster-placeholder .poster-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .poster-placeholder .poster-subtitle {
            font-size: 1.2rem;
            color: #ff6b6b;
            margin-bottom: 2rem;
        }

        .poster-placeholder .poster-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .poster-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #e94560;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 10;
        }

        .btn {
            padding: 1rem 2.5rem;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            display: inline-block;
            margin-right: 1rem;
            margin-top: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #e94560;
            color: #e94560;
        }

        .btn-outline:hover {
            background: #e94560;
        }

        /* Live Subscriber Counter */
        .live-counter-section {
            padding: 2rem 5%;
            background: #0a0a0a;
            text-align: center;
            border-top: 2px solid #e94560;
            border-bottom: 2px solid #e94560;
        }

        .counter-container {
            display: inline-block;
            background: rgba(233, 69, 96, 0.1);
            padding: 1.5rem 3rem;
            border-radius: 15px;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .live-badge {
            display: inline-block;
            background: #ff0000;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            font-size: 0.9rem;
            animation: pulse 2s infinite;
            margin-right: 1rem;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .subscriber-count {
            font-size: 3rem;
            font-weight: bold;
            color: #e94560;
            margin-top: 0.5rem;
        }

        .channel-name {
            font-size: 1.2rem;
            color: #ccc;
        }

        /* Cast Section */
        .cast-section {
            padding: 5rem 5%;
            background: #0f0f1a;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: #e94560;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 100px;
            height: 3px;
            background: #e94560;
            margin: 1rem auto;
        }

        .cast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .cast-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }

        .cast-card:hover {
            transform: translateY(-10px);
            border-color: #e94560;
        }

        .cast-img {
            width: 100%;
            height: 250px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #e94560;
            position: relative;
        }

        .cast-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cast-info {
            padding: 1.5rem;
        }

        .cast-info h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #e94560;
        }

        .cast-info .character {
            color: #ff6b6b;
            font-style: italic;
            margin-bottom: 0.3rem;
            font-size: 0.95rem;
        }

        .cast-info .real-name {
            color: #aaa;
            font-size: 0.85rem;
        }

        /* Trailer Section */
        .trailer-section {
            padding: 5rem 5%;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
        }

        .trailer-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .trailer-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            border: 2px solid #e94560;
        }

        /* Gallery Section */
        .gallery-section {
            padding: 5rem 5%;
            background: #0f0f1a;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(233, 69, 96, 0.2);
            transition: transform 0.3s;
            aspect-ratio: 16/9;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            border-color: #e94560;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Channel Section */
        .channel-section {
            padding: 5rem 5%;
            background: #0f0f1a;
            text-align: center;
        }

        .channel-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 20px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .channel-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 1rem;
            border: 3px solid #e94560;
            background: #1a1a2e;
        }

        .channel-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 2rem;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
        }

        /* Episodes Section */
        .episodes-section {
            padding: 5rem 5%;
            background: #0f0f1a;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .episode-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(233, 69, 96, 0.2);
            transition: transform 0.3s;
        }

        .episode-card:hover {
            transform: scale(1.05);
            border-color: #e94560;
        }

        .episode-thumb {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .play-btn {
            background: #e94560;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .episode-card:hover .play-btn {
            transform: scale(1.1);
        }

        .episode-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e94560;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .episode-duration {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .episode-info {
            padding: 1.5rem;
        }

        .episode-info h3 {
            color: #e94560;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .episode-info p {
            color: #aaa;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .watch-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: 2px solid #e94560;
            color: #e94560;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
        }

        .watch-btn:hover {
            background: #e94560;
            color: white;
        }

        /* Footer */
        footer {
            background: #000;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .social-links {
            margin-bottom: 1rem;
        }

        .social-links a {
            color: white;
            font-size: 1.5rem;
            margin: 0 1rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #e94560;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 2rem 1rem;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }
            
            .nav-links {
                display: none;
            }
            
            .cast-grid, .gallery-grid, .episode-grid {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            }

            .poster {
                max-width: 280px;
                margin: 0 auto;
            }
        }
    </style>
</head>

  <div class="glass-card">
    <div class="header">
      <div class="logo-icon">
        <i class="fas fa-capsules"></i>
        
      </div>
      <div class="title">
        <h1>MedAI</h1>
        <div class="sub">
          <i class="fas fa-globe"></i> Offline · 250+ medicines
        </div>
      </div>
    </div>

    <div class="search-section">
      <div class="input-group">
        <input type="text" id="medicineInput" placeholder="e.g. Metformin, Aspirin, Ibuprofen..." autocomplete="off" />
        <button id="searchBtn">
          <i class="fas fa-search"></i> Search
        </button>
      </div>
      <div class="status-badge">
        <div class="api-indicator">
          <i class="fas fa-database"></i> <span id="apiSourceText">Local database · 250+ entries</span>
        <a href="Ekaki.html"><button style="background: blue; color: orange;">Ekaki Page</button></a>
        </div>
        <button id="clearResultBtn" class="clear-btn">
          <i class="fas fa-eraser"></i> Clear
        </button>
      </div>
    </div>

    <!-- Result area -->
    <div id="resultContainer" class="result-card hidden">
      <div id="dynamicContent"></div>
    </div>

    <!-- Initial placeholder / welcome -->

      // --------------------------------------------------------------

      // Parse the database into a usable object
      const medicineMap = new Map();

      function parseMedicineDB() {
        const lines = medicineDB.split('\n').map(line => line.trim()).filter(line => line.length > 0 && line.includes('|'));
        for (const line of lines) {
          const parts = line.split('|');
          if (parts.length >= 2) {
            const medicineName = parts[0].trim().toLowerCase();
            const diseasesRaw = parts[1].trim();
            // Split diseases by comma and clean
            const diseases = diseasesRaw.split(',').map(d => d.trim()).filter(d => d.length > 0);
            if (medicineName && diseases.length > 0) {
              // If medicine already exists, merge diseases (avoid duplicates)
              if (medicineMap.has(medicineName)) {
                const existing = medicineMap.get(medicineName);
                const combined = new Set([...existing, ...diseases]);
                medicineMap.set(medicineName, Array.from(combined));
              } else {
                medicineMap.set(medicineName, diseases);
              }
            }
          }
        }
      }

      // Run parsing immediately
      parseMedicineDB();

      // DOM elements
      const medicineInput = document.getElementById('medicineInput');
      const searchBtn = document.getElementById('searchBtn');
      const clearResultBtn = document.getElementById('clearResultBtn');
      const resultContainer = document.getElementById('resultContainer');
      const dynamicContent = document.getElementById('dynamicContent');
      const welcomeMessage = document.getElementById('welcomeMessage');
      const apiSourceText = document.getElementById('apiSourceText');

      function showLoader() {
        dynamicContent.innerHTML = `
          <div class="loader">
            <i class="fas fa-spinner fa-pulse"></i> Searching local medicine database...
          </div>
        `;
        resultContainer.classList.remove('hidden');
        welcomeMessage.classList.add('hidden');
      }

      function showError(message) {
        dynamicContent.innerHTML = `
          <div class="error-message">
            <i class="fas fa-exclamation-circle"></i> ${message}
          </div>
        `;
        resultContainer.classList.remove('hidden');
        welcomeMessage.classList.add('hidden');
      }

      function renderMedicineInfo(medicineName, diseases) {
        const displayName = medicineName.charAt(0).toUpperCase() + medicineName.slice(1);
        const diseasesHtml = diseases.map(d => `<span class="disease-tag"><i class="fas fa-notes-medical"></i> ${d}</span>`).join('');

        dynamicContent.innerHTML = `
          <div class="medicine-header">
            <span class="medicine-name"><i class="fas fa-pills" style="margin-right: 0.3rem;"></i>${displayName}</span>
            <span class="badge"><i class="far fa-check-circle"></i> ${diseases.length} indication(s)</span>
          </div>
          <div class="symptoms-box">
            <div class="symptoms-label">
              <i class="fas fa-clipboard-list"></i> Symptoms / Diseases (Indications)
            </div>
            <div class="disease-list">
              ${diseasesHtml}
            </div>
          </div>
          <div class="info-text">
            <i class="fas fa-check-circle" style="color: #0f6b82;"></i> Coded by: <br> ©Paritosh Pandey <br> Data base created by: <br> ©Aviral Pandey
          </div>
        `;
        resultContainer.classList.remove('hidden');
        welcomeMessage.classList.add('hidden');
      }

      function handleSearch() {
        const query = medicineInput.value.trim();
        if (!query) {
          showError('Please enter a medicine name.');
          return;
        }

        const queryLower = query.toLowerCase();
        
        // Search in map - exact match first, then partial
        if (medicineMap.has(queryLower)) {
          renderMedicineInfo(queryLower, medicineMap.get(queryLower));
          apiSourceText.innerHTML = 'Local database · matched';
          return;
        }

        // Partial search: find all medicines that include the query
        const matches = [];
        for (const [medName, diseases] of medicineMap.entries()) {
          if (medName.includes(queryLower)) {
            matches.push({ name: medName, diseases });
          }
        }

        if (matches.length === 0) {
          showError(`No medicine found matching "${query}". Try another name or check spelling.`);
          apiSourceText.innerHTML = 'Local database · not found';
          return;
        }

        if (matches.length === 1) {
          renderMedicineInfo(matches[0].name, matches[0].diseases);
          apiSourceText.innerHTML = 'Local database · 1 match';
          return;
        }

        // Multiple matches: show summary with clickable suggestions? For simplicity show first match with note
        // But better UX: display the first match and mention others
        const firstMatch = matches[0];
        const otherNames = matches.slice(1).map(m => m.name.charAt(0).toUpperCase() + m.name.slice(1)).join(', ');
        
        renderMedicineInfo(firstMatch.name, firstMatch.diseases);
        dynamicContent.innerHTML += `
          <div class="info-text" style="margin-top:0.8rem; background:#e6f3f8; padding:0.5rem 1rem; border-radius:1rem;">
            <i class="fas fa-search"></i> Also found similar: ${otherNames}. Refine search for exact match.
          </div>
        `;
        apiSourceText.innerHTML = `Local database · ${matches.length} matches`;
      }

      function clearResults() {
        resultContainer.classList.add('hidden');
        welcomeMessage.classList.remove('hidden');
        medicineInput.value = '';
        apiSourceText.innerHTML = 'Local database · 250+ entries';
      }

      // Event listeners
      searchBtn.addEventListener('click', handleSearch);
      medicineInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleSearch();
        }
      });

      clearResultBtn.addEventListener('click', clearResults);

      // Initial state
      window.addEventListener('load', () => {
        resultContainer.classList.add('hidden');
        welcomeMessage.classList.remove('hidden');
      });

    })();
  </script>
