    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #e94560;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 2rem;
            font-size: 1.1rem;
            transition: color 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #e94560;
        }

        /* Hero Section with Poster */
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 5%;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 90vh;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .hero-content {
            flex: 1;
            min-width: 300px;
        }

        .hero-content h1 {
            font-size: 4.5rem;
            margin-bottom: 1rem;
            animation: glow 2s ease-in-out infinite alternate;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #e94560, 0 0 20px #e94560, 0 0 30px #e94560; }
            to { text-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b, 0 0 60px #ff6b6b; }
        }

        .hero-content .tagline {
            font-size: 1.3rem;
            color: #ccc;
            margin-bottom: 0.5rem;
            font-style: italic;
        }

        .hero-content .description {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .poster-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .poster {
            width: 100%;
            max-width: 400px;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(233, 69, 96, 0.3);
            border: 3px solid #e94560;
            transition: transform 0.3s, box-shadow 0.3s;
            background: #1a1a2e;
        }

        .poster:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 80px rgba(233, 69, 96, 0.5);
        }

        .poster img {
            width: 100%;
            height: auto;
            display: block;
        }

        .poster-placeholder {
            width: 100%;
            aspect-ratio: 2/3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #e94560;
            text-align: center;
            padding: 2rem;
        }

        .poster-placeholder .poster-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .poster-placeholder .poster-subtitle {
            font-size: 1.2rem;
            color: #ff6b6b;
            margin-bottom: 2rem;
        }

        .poster-placeholder .poster-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .poster-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #e94560;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 10;
        }

        .btn {
            padding: 1rem 2.5rem;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            display: inline-block;
            margin-right: 1rem;
            margin-top: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #e94560;
            color: #e94560;
        }

        .btn-outline:hover {
            background: #e94560;
        }

        /* Live Subscriber Counter */
        .live-counter-section {
            padding: 2rem 5%;
            background: #0a0a0a;
            text-align: center;
            border-top: 2px solid #e94560;
            border-bottom: 2px solid #e94560;
        }

        .counter-container {
            display: inline-block;
            background: rgba(233, 69, 96, 0.1);
            padding: 1.5rem 3rem;
            border-radius: 15px;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .live-badge {
            display: inline-block;
            background: #ff0000;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            font-size: 0.9rem;
            animation: pulse 2s infinite;
            margin-right: 1rem;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .subscriber-count {
            font-size: 3rem;
            font-weight: bold;
            color: #e94560;
            margin-top: 0.5rem;
        }

        .channel-name {
            font-size: 1.2rem;
            color: #ccc;
        }

        /* Cast Section */
        .cast-section {
            padding: 5rem 5%;
            background: #0f0f1a;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: #e94560;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 100px;
            height: 3px;
            background: #e94560;
            margin: 1rem auto;
        }

        .cast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .cast-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }

        .cast-card:hover {
            transform: translateY(-10px);
            border-color: #e94560;
        }

        .cast-img {
            width: 100%;
            height: 250px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #e94560;
            position: relative;
        }

        .cast-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cast-info {
            padding: 1.5rem;
        }

        .cast-info h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #e94560;
        }

        .cast-info .character {
            color: #ff6b6b;
            font-style: italic;
            margin-bottom: 0.3rem;
            font-size: 0.95rem;
        }

        .cast-info .real-name {
            color: #aaa;
            font-size: 0.85rem;
        }

        /* Trailer Section */
        .trailer-section {
            padding: 5rem 5%;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
        }

        .trailer-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .trailer-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            border: 2px solid #e94560;
        }

        /* Gallery Section */
        .gallery-section {
            padding: 5rem 5%;
            background: #0f0f1a;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(233, 69, 96, 0.2);
            transition: transform 0.3s;
            aspect-ratio: 16/9;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            border-color: #e94560;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Channel Section */
        .channel-section {
            padding: 5rem 5%;
            background: #0f0f1a;
            text-align: center;
        }

        .channel-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 20px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .channel-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 1rem;
            border: 3px solid #e94560;
            background: #1a1a2e;
        }

        .channel-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 2rem;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
        }

        /* Episodes Section */
        .episodes-section {
            padding: 5rem 5%;
            background: #0f0f1a;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .episode-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(233, 69, 96, 0.2);
            transition: transform 0.3s;
        }

        .episode-card:hover {
            transform: scale(1.05);
            border-color: #e94560;
        }

        .episode-thumb {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .play-btn {
            background: #e94560;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .episode-card:hover .play-btn {
            transform: scale(1.1);
        }

        .episode-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e94560;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .episode-duration {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .episode-info {
            padding: 1.5rem;
        }

        .episode-info h3 {
            color: #e94560;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .episode-info p {
            color: #aaa;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .watch-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: 2px solid #e94560;
            color: #e94560;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
        }

        .watch-btn:hover {
            background: #e94560;
            color: white;
        }

        /* Footer */
        footer {
            background: #000;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .social-links {
            margin-bottom: 1rem;
        }

        .social-links a {
            color: white;
            font-size: 1.5rem;
            margin: 0 1rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #e94560;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 2rem 1rem;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }
            
            .nav-links {
                display: none;
            }
            
            .cast-grid, .gallery-grid, .episode-grid {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            }

            .poster {
                max-width: 280px;
                margin: 0 auto;
            }
        }
    </style>
</head>
