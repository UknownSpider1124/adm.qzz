<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>· ADM MC</title>
  <!-- Apple-style font + Poppins base -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="APT.png" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Autumn warmth gradient — deep golden hour + fall tones */
      background: radial-gradient(circle at 20% 30%, #e07a2c, #b13e1a, #5e1e0a);
      background-size: 200% 200%;
      position: relative;
      overflow: hidden;
    }

    /* ========= APPLE-STYLE GLASS BACKGROUND LAYER ========= */
    .glass-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    /* === SUN (top-left corner, glowing with realistic rays) === */
    .sun {
      position: absolute;
      top: 45px;
      left: 45px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, #FFE484, #FFB347, #FF8C42);
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(255, 180, 50, 0.9), 0 0 90px rgba(255, 140, 0, 0.6);
      z-index: 5;
      cursor: default;
      transition: all 0.3s ease;
      animation: softGlow 4s ease-in-out infinite alternate;
    }
    /* Sun rays effect via pseudo-element */
    .sun::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 140%;
      height: 140%;
      background: radial-gradient(circle, rgba(255,200,100,0.3) 0%, rgba(255,160,60,0) 80%);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      animation: rayRotate 12s linear infinite;
    }
    .sun::after {
      content: "☀️";
      position: absolute;
      font-size: 44px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.7;
      filter: drop-shadow(0 0 6px rgba(0,0,0,0.2));
    }
    @keyframes softGlow {
      0% { box-shadow: 0 0 30px rgba(255, 180, 70, 0.7); transform: scale(1);}
      100% { box-shadow: 0 0 60px rgba(255, 200, 90, 1), 0 0 20px rgba(255, 120, 0, 0.5); transform: scale(1.02);}
    }
    @keyframes rayRotate {
      0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 0.6;}
      100% { transform: translate(-50%, -50%) rotate(360deg); opacity: 0.9;}
    }

    /* ========= GARDEN BACKGROUND (blurred glass, apple-like depth) ========= */
    /* garden container: positioned in lower area with soft frosted overlay */
    .garden-scene {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 38%;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300"><path fill="%233d2b1a" opacity="0.5" d="M0,200 Q80,170 180,190 T360,170 T540,195 T720,175 T900,190 T1080,165 L1200,150 L1200,300 L0,300 Z"/><path fill="%235a3e28" opacity="0.4" d="M0,220 Q100,200 220,215 T440,205 T660,225 T880,210 T1100,195 L1200,190 L1200,300 L0,300 Z"/><circle cx="200" cy="160" r="14" fill="%23c27e3a" opacity="0.6"/><circle cx="350" cy="140" r="12" fill="%23d68c3c" opacity="0.7"/><circle cx="520" cy="155" r="16" fill="%23b96f2e" opacity="0.5"/><circle cx="780" cy="130" r="11" fill="%23cd8239" opacity="0.6"/><circle cx="940" cy="145" r="13" fill="%23bd732f" opacity="0.7"/><path d="M320,170 L330,130 L340,170 Z" fill="%238c5a2b" opacity="0.5"/><path d="M700,155 L708,115 L716,155 Z" fill="%237c4e24" opacity="0.5"/><path d="M880,150 L890,110 L900,150 Z" fill="%2396632e" opacity="0.5"/></svg>') repeat-x bottom;
      background-size: 400px 150px;
      background-position: bottom;
      z-index: 1;
      backdrop-filter: blur(12px) brightness(0.85);
      -webkit-backdrop-filter: blur(12px) brightness(0.85);
      border-top: 1px solid rgba(255, 210, 140, 0.5);
      box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.2);
      pointer-events: none;
    }
    /* additional garden elements: flowers & grass silhouettes */
    .garden-flora {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 180px;
      background: radial-gradient(ellipse at 20% 100%, rgba(140, 80, 30, 0.4), transparent 70%);
      z-index: 1;
      pointer-events: none;
    }
    /* tiny flowers using pseudo elements + animation */
    .garden-scene::before {
      content: "🌸 🍁 🍂 🌻 🌾";
      position: absolute;
      bottom: 20px;
      left: 5%;
      font-size: 34px;
      opacity: 0.5;
      filter: blur(0.6px);
      letter-spacing: 20px;
      white-space: pre;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
      animation: driftFlowers 24s linear infinite alternate;
    }
    @keyframes driftFlowers {
      0% { transform: translateX(0px); opacity: 0.4; letter-spacing: 18px;}
      100% { transform: translateX(40px); opacity: 0.7; letter-spacing: 30px;}
    }
    /* additional apple-style blur layers */
    .vignette-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 70% 30%, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ========= MAIN GLASS CARD (Apple-tier Frosted Glass) ========= */
    .login-box {
      position: relative;
      z-index: 20;
      width: 440px;
      max-width: 88%;
      padding: 42px 36px 48px;
      /* APPLE STYLE glass: light, semi-transparent, extreme blur, subtle border */
      background: rgba(30, 20, 12, 0.38);
      backdrop-filter: blur(28px) saturate(200%);
      -webkit-backdrop-filter: blur(28px) saturate(200%);
      border-radius: 56px;
      border: 0.5px solid rgba(255, 215, 160, 0.55);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(255, 230, 170, 0.2) inset;
      text-align: center;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      animation: glassRise 0.8s ease-out;
    }

    @keyframes glassRise {
      0% { opacity: 0; transform: scale(0.96) translateY(25px); backdrop-filter: blur(12px);}
      100% { opacity: 1; transform: scale(1) translateY(0);}
    }

    .login-box:hover {
      background: rgba(40, 28, 18, 0.48);
      border-color: rgba(255, 190, 110, 0.8);
      box-shadow: 0 30px 55px -12px rgba(0, 0, 0, 0.5);
    }

    /* Typography — Apple inspired, warm autumn contrast */
    h2 {
      margin-bottom: 28px;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.3px;
      background: linear-gradient(125deg, #FFF2DE, #FFD6A5, #FEB47B);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: inline-block;
      padding-bottom: 8px;
    }

    /* apple-style labels */
    label {
      display: block;
      text-align: left;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      letter-spacing: -0.2px;
      color: #FFF3E4;
      opacity: 0.9;
      font-family: 'Inter', system-ui;
      text-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }

    /* Input fields: smooth, rounded, glassy like macOS */
    input {
      width: 100%;
      padding: 15px 20px;
      margin: 5px 0 18px 0;
      border: none;
      outline: none;
      background: rgba(50, 35, 22, 0.45);
      border-radius: 44px;
      color: #FFF4E8;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.25s;
      border: 0.5px solid rgba(255, 200, 130, 0.4);
      backdrop-filter: blur(4px);
      font-family: 'Inter', monospace;
    }

    input::placeholder {
      color: rgba(255, 225, 180, 0.7);
      font-weight: 400;
      font-size: 14px;
    }

    input:focus {
      background: rgba(72, 50, 32, 0.65);
      border-color: rgba(255, 180, 90, 0.9);
      box-shadow: 0 0 0 3px rgba(255, 150, 50, 0.3);
      color: white;
    }

    /* Apple-style button (sleek, matte autumn) */
    input[type="submit"] {
      background: rgba(220, 105, 30, 0.9);
      color: #FFF6EA;
      font-weight: 600;
      cursor: pointer;
      margin-top: 18px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
      font-size: 16.5px;
      border: 0.5px solid rgba(255, 190, 110, 0.8);
      transition: 0.2s ease;
      letter-spacing: 1px;
    }

    input[type="submit"]:hover {
      background: #e55a1a;
      transform: translateY(-2px);
      box-shadow: 0 12px 25px -8px rgba(0, 0, 0, 0.4);
    }

    /* Error message — apple style minimal pill */
    #error {
      color: #FFE0B5;
      font-size: 13px;
      margin-top: 22px;
      min-height: 20px;
      font-weight: 500;
      background: rgba(160, 50, 20, 0.5);
      backdrop-filter: blur(10px);
      display: inline-block;
      padding: 6px 20px;
      border-radius: 50px;
      font-family: monospace;
      letter-spacing: 0.3px;
      border: 0.5px solid rgba(255, 150, 80, 0.5);
    }

    /* small decorative garden elements (grass wisps) near card bottom */
    .garden-accent {
      position: absolute;
      bottom: 12px;
      left: 30px;
      font-size: 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 10;
      filter: blur(1px);
      transform: rotate(-5deg);
    }

    /* mobile adaptation */
    @media (max-width: 560px) {
      .sun {
        width: 70px;
        height: 70px;
        top: 20px;
        left: 20px;
      }
      .sun::after {
        font-size: 28px;
      }
      .login-box {
        padding: 32px 24px;
      }
    }

    /* additional tiny petals falling effect (apple elegant) */
    .petal {
      position: absolute;
      font-size: 20px;
      user-select: none;
      pointer-events: none;
      opacity: 0.5;
      animation: fall 14s linear infinite;
      z-index: 3;
    }
    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.6;}
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0;}
    }
  </style>
</head>
<body>

  <!-- background gradient texture -->
  <div class="glass-backdrop"></div>
  
  <!-- SUN in top-left corner with elegant glow -->
  <div class="sun"></div>

  <!-- APPLE-STYLE BLURRY GARDEN SCENE (lower portion) -->
  <div class="garden-scene"></div>
  <div class="garden-flora"></div>
  
  <!-- extra organic garden details (fresh grass touch) -->
  <div class="garden-accent">🌿🍂🌾🍁</div>
  
  <!-- subtle vignette for premium feel -->
  <div class="vignette-overlay"></div>

  <!-- main glass card authentication -->
  <div class="login-box">
    <h2>ADM MC</h2>
    <form onsubmit="return validateLogin()">
      <label>🍂 Username</label>
      <input type="text" id="username" placeholder="User ID" required>
      
      <label>🍁 Password</label>
      <input type="password" id="password" placeholder="Password" required>
      
      <input type="submit" value="Sign In">

      <p id="error"></p>
    </form>
  </div>

  <!-- dynamic falling petals for magical autumn garden -->
  <script>
    // create a few soft falling autumn leaves / petals for atmosphere
    (function addFloatingElements() {
      const symbols = ['🍂', '🍁', '🌸', '🌼', '🍃', '🌾'];
      for (let i = 0; i < 14; i++) {
        const petal = document.createElement('div');
        petal.classList.add('petal');
        petal.innerText = symbols[Math.floor(Math.random() * symbols.length)];
        const size = Math.floor(Math.random() * 18 + 14) + 'px';
        petal.style.fontSize = size;
        petal.style.left = Math.random() * 100 + '%';
        petal.style.animationDuration = Math.random() * 8 + 8 + 's';
        petal.style.animationDelay = Math.random() * 10 + 's';
        petal.style.opacity = Math.random() * 0.5 + 0.25;
        document.body.appendChild(petal);
      }
    })();

    // ---------- ORIGINAL USERS & LOGIC (exactly same) ----------
    const users = {
      "aviral": "Akira",
      "daksh": "Dg_Sigma",
      "madhav": "ma5dav",
      "admin": "admin@123",
      

    };

    function validateLogin() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (users[username] && users[username] === password) {
          // Redirect to user-specific page (preserved)
          window.location.href = username + ".html";
          return false;
      } else {
          const errorElement = document.getElementById("error");
          errorElement.innerText = "Invalid username or password.";
          // Shake effect (preserved exactly same animation)
          const box = document.querySelector('.login-box');
          box.style.transform = "translateX(10px)";
          setTimeout(() => { box.style.transform = "translateX(-10px)"; }, 100);
          setTimeout(() => { box.style.transform = "translateX(0)"; }, 200);
          return false;
      }
    }
  </script>
</body>
</html>
